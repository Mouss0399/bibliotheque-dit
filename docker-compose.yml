version: '3.8'

services:

  # Base de données PostgreSQL
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: bibliotheque
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  # Service Livres
  livres:
    build: ./services/livres
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/bibliotheque
    depends_on:
      - db

  # Service Utilisateurs
  utilisateurs:
    build: ./services/utilisateurs
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/bibliotheque
    depends_on:
      - db

  # Service Emprunts
  emprunts:
    build: ./services/emprunts
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/bibliotheque
    depends_on:
      - db

  # Frontend
  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - livres
      - utilisateurs
      - emprunts

volumes:
  postgres_data: